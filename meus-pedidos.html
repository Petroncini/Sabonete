<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ateliê Camila Petroncini — Meus Pedidos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#C8977A',
            secondary: '#A8866B',
            heading: '#5C3D2E',
            accent: '#8B9E84',
            cream: '#FAF5EF',
          },
          fontFamily: {
            head: ['"Playfair Display"', 'Georgia', 'serif'],
            script: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['Lato', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background-color: var(--bg); }
    .pedido-card { background: #fff; border-radius: 14px; box-shadow: var(--shadow); padding: 1.5rem; }
  </style>
</head>

<body>
  <header>
    <nav id="navbar" class="hero-mode" role="navigation" aria-label="Menu principal">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <a href="index.html" class="nav-logo" aria-label="Início">
          <img src="imagens/marca.jpeg" alt="Ateliê Camila Petroncini" />
        </a>
        <ul class="hidden md:flex items-center gap-8 list-none m-0 p-0">
          <li><a href="index.html#sobre" class="nav-link">Sobre</a></li>
          <li><a href="index.html#produtos" class="nav-link">Produtos</a></li>
          <li><a href="meus-pedidos.html" class="nav-link"><b>Meus Pedidos</b></a></li>
        </ul>
        <div class="flex items-center gap-4">
          <button id="hamburger" class="md:hidden p-1" aria-label="Abrir menu" aria-expanded="false" style="color:var(--heading)">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
      <div id="mobile-menu" role="menu" aria-label="Menu mobile">
        <a href="index.html" class="nav-link" role="menuitem">Início</a>
        <a href="meus-pedidos.html" class="nav-link" role="menuitem">Meus Pedidos</a>
      </div>
    </nav>
  </header>

  <main style="padding-top: 120px; padding-bottom: 80px; min-height: 80vh;">
    <div class="max-w-3xl mx-auto px-4">
      <div class="reveal">
        <h1 class="section-title text-center">Meus Pedidos</h1>
        <p class="section-subtitle text-center">Acompanhe o status das suas compras</p>
        <div class="floral-divider"><span>📦</span></div>
      </div>

      <div id="pedidos-container" class="mt-12 space-y-4">
        <p class="text-center text-gray-400">Carregando seus pedidos…</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="max-w-6xl mx-auto text-center" style="padding-bottom: 20px;">
      <p class="footer-copy">© 2024 Ateliê Camila Petroncini. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script>
    const token = localStorage.getItem('token');
    if (!token) {
        alert('Você precisa fazer login para ver seus pedidos.');
        window.location.href = 'login.html';
    }

    // Guarda de sessão — token "fantasma" (válido mas de usuário que não existe mais).
    (function installSessionGuard() {
        const originalFetch = window.fetch;
        window.fetch = async function (...args) {
            const response = await originalFetch.apply(this, args);
            if (response.status === 401 && localStorage.getItem('token')) {
                let isSessaoInvalida = false;
                try {
                    const data = await response.clone().json();
                    isSessaoInvalida = data?.error === 'SESSAO_INVALIDA';
                } catch (e) { /* corpo não é JSON, ignora */ }
                if (isSessaoInvalida) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    alert('Sua sessão expirou. Faça login novamente.');
                    window.location.href = 'login.html';
                }
            }
            return response;
        };
    })();

    const STATUS_INFO = {
        pendente: { label: 'Aguardando Pagamento', badge: 'bg-yellow-100 text-yellow-800' },
        pago: { label: 'Pago', badge: 'bg-green-100 text-green-800' },
        enviado: { label: 'Enviado', badge: 'bg-blue-100 text-blue-800' },
        cancelado: { label: 'Cancelado', badge: 'bg-red-100 text-red-800' },
    };

    async function carregarPedidos() {
        const container = document.getElementById('pedidos-container');
        try {
            const res = await fetch('/api/pedidos/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!res.ok) {
                container.innerHTML = '<p class="text-center text-red-500">Erro ao carregar seus pedidos.</p>';
                return;
            }

            const pedidos = await res.json();

            if (pedidos.length === 0) {
                container.innerHTML = `
                    <div class="pedido-card text-center">
                        <p class="text-gray-500 mb-4">Você ainda não fez nenhum pedido.</p>
                        <a href="index.html#produtos" class="btn-primary">Ver Produtos</a>
                    </div>`;
                return;
            }

            container.innerHTML = pedidos.map(ped => {
                const info = STATUS_INFO[ped.status] || { label: ped.status, badge: 'bg-gray-100 text-gray-800' };
                const data = new Date(ped.criado_em).toLocaleString('pt-BR');

                return `
                <div class="pedido-card">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="font-head text-lg font-bold" style="color:var(--heading)">Pedido #${ped.id}</h3>
                            <p class="text-xs text-gray-400">${data}</p>
                        </div>
                        <span class="px-2 py-1 rounded text-xs font-semibold ${info.badge}">${info.label.toUpperCase()}</span>
                    </div>
                    <div class="text-sm text-gray-600 mb-3">
                        <p>${ped.cliente_endereco}</p>
                    </div>
                    ${ped.codigo_rastreio ? `
                    <div class="mb-3 p-2 bg-blue-50 rounded text-sm">
                        📦 Código de rastreio: <strong>${ped.codigo_rastreio}</strong>
                    </div>` : ''}
                    <div class="flex justify-between items-center pt-3 border-t" style="border-color:var(--border)">
                        <span class="font-bold" style="color:var(--primary)">R$ ${parseFloat(ped.total).toFixed(2).replace('.', ',')}</span>
                        ${ped.status === 'pendente' ? `<button onclick="cancelarPedido(${ped.id})" class="text-sm text-red-500 hover:underline">Cancelar Pedido</button>` : ''}
                    </div>
                </div>`;
            }).join('');

        } catch (err) {
            console.error(err);
            container.innerHTML = '<p class="text-center text-red-500">Erro ao conectar com o servidor.</p>';
        }
    }

    async function cancelarPedido(id) {
        if (!confirm('Tem certeza que deseja cancelar este pedido? Essa ação não pode ser desfeita.')) return;

        try {
            const res = await fetch(`/api/pedidos/${id}/cancelar`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (!res.ok) {
                alert('Erro: ' + (data.error || 'tente novamente'));
                return;
            }

            carregarPedidos();
        } catch (err) {
            alert('Erro ao conectar com o servidor.');
        }
    }

    document.addEventListener('DOMContentLoaded', carregarPedidos);
  </script>
</body>
</html>
