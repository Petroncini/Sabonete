services:
  db:
    image: postgres:16-alpine
    container_name: sabonete_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: sabonete
    ports:
      - "${DB_PORT}:5432"
    volumes:
      # Volume persistente para não perder os dados quando o container parar
      # Migrações (schema e data) agora são aplicadas por backend/migrate.js no start do app
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
