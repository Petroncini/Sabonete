services:
  db:
    image: postgres:16-alpine
    container_name: sabonete_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: sabonete
    ports:
      - "${DB_PORT}:5432"
    volumes:
      # Monta a pasta de scripts para que o PostgreSQL rode todos os .sql (schema e data) automaticamente
      - ./init-scripts:/docker-entrypoint-initdb.d/
      # Volume persistente para não perder os dados quando o container parar
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
