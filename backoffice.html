<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ateliê Camila Petroncini — Backoffice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#C8977A',
            secondary: '#A8866B',
            heading: '#5C3D2E',
            accent: '#8B9E84',
            cream: '#FAF5EF',
          },
          fontFamily: {
            head: ['"Playfair Display"', 'Georgia', 'serif'],
            script: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['Lato', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background-color: #f3f4f6; }
    .admin-container { background: #fff; border-radius: 14px; box-shadow: var(--shadow); padding: 2rem; overflow-x: auto; }
    .admin-table { w-full; text-left; border-collapse: collapse; }
    .admin-table th, .admin-table td { padding: 1rem; border-bottom: 1px solid var(--border); }
    .admin-table th { font-family: var(--font-head); color: var(--heading); background-color: var(--cream); font-weight: bold; border-top-left-radius: 8px; border-top-right-radius: 8px; }
    .btn-danger { background-color: #ef4444; color: white; padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.8rem; transition: background 0.2s; }
    .btn-danger:hover { background-color: #dc2626; }
  </style>
</head>

<body>
  <header style="background:var(--bg)">
    <nav id="navbar" class="scrolled" role="navigation" aria-label="Menu principal">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <a href="index.html" class="nav-logo" aria-label="Início">
          <span class="font-head text-xl font-bold" style="color:var(--heading)">Admin Panel</span>
        </a>
        <ul class="hidden md:flex items-center gap-8 list-none m-0 p-0">
          <li><a href="index.html" class="nav-link">← Voltar ao Site</a></li>
        </ul>
        <div class="flex items-center gap-4">
          <button id="hamburger" class="md:hidden p-1" aria-label="Abrir menu" aria-expanded="false" style="color:var(--heading)">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
      <div id="mobile-menu" role="menu" aria-label="Menu mobile">
        <a href="index.html" class="nav-link" role="menuitem">Voltar ao Site</a>
      </div>
    </nav>
  </header>

  <main style="padding-top: 120px; padding-bottom: 80px; min-height: 85vh;">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 reveal">
        <div>
          <h1 class="section-title" style="text-align: left; margin-bottom: 0;">Gerenciamento de Estoque</h1>
          <p class="section-subtitle" style="text-align: left;">Adicione, edite ou remova produtos do catálogo</p>
        </div>
        <button class="btn-primary mt-4 md:mt-0" onclick="alert('Modal de cadastro de produto mockado!')">+ Adicionar Novo Produto</button>
      </div>
      
      <div class="admin-container mt-6 reveal reveal-delay-1">
        <table class="admin-table w-full whitespace-nowrap">
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagem</th>
              <th>Produto</th>
              <th>Categoria</th>
              <th>Preço</th>
              <th>Estoque</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="produtos-tbody">
            <!-- Renderizado via JS -->
          </tbody>
        </table>
        
        <!-- Controles de paginação mock -->
        <div class="flex justify-between items-center mt-6 p-4 bg-gray-50 rounded-lg">
           <span class="text-sm text-gray-500">Mostrando 1-3 de 8 produtos</span>
           <div class="flex gap-2">
             <button class="px-3 py-1 border rounded bg-white text-gray-400 hover:bg-gray-100 disabled">&lt;</button>
             <button class="px-3 py-1 border rounded bg-primary text-white border-primary">1</button>
             <button class="px-3 py-1 border rounded bg-white text-heading hover:bg-gray-100">2</button>
             <button class="px-3 py-1 border rounded bg-white text-heading hover:bg-gray-100">3</button>
             <button class="px-3 py-1 border rounded bg-white text-heading hover:bg-gray-100">&gt;</button>
           </div>
        </div>
      </div>

      <!-- SEÇÃO DE PEDIDOS -->
      <div class="flex flex-col md:flex-row md:items-center justify-between mt-16 mb-6 reveal reveal-delay-2">
        <div>
          <h2 class="section-title text-2xl" style="text-align: left; margin-bottom: 0;">Pedidos Recentes</h2>
          <p class="section-subtitle" style="text-align: left;">Acompanhe e gerencie os pedidos da loja</p>
        </div>
      </div>

      <div class="admin-container reveal reveal-delay-3">
        <table class="admin-table w-full whitespace-nowrap">
          <thead>
            <tr>
              <th>Pedido</th>
              <th>Cliente</th>
              <th>Data</th>
              <th>Status</th>
              <th>Total</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="pedidos-tbody">
            <!-- Renderizado via JS -->
          </tbody>
        </table>
        
        <div class="flex justify-center mt-6">
           <button class="text-sm font-bold" style="color:var(--primary); text-decoration: underline;" onclick="alert('Ver todos os pedidos mockado')">Ver Todos os Pedidos</button>
        </div>
      </div>

    </div>
  </main>
  
  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token || user.role !== 'admin') {
        alert("Acesso Negado. Faça login como administrador.");
        window.location.href = 'login.html';
    }

    async function loadAdminData() {
        try {
            // Fetch Produtos
            const resProdutos = await fetch('http://localhost:3000/api/produtos');
            const produtos = await resProdutos.json();
            const tbodyProdutos = document.getElementById('produtos-tbody');
            
            tbodyProdutos.innerHTML = produtos.map(p => `
                <tr>
                  <td class="text-gray-500">#${p.id}</td>
                  <td class="font-bold" style="color:var(--heading)">${p.nome}</td>
                  <td>R$ ${parseFloat(p.preco).toFixed(2).replace('.', ',')}</td>
                  <td><span class="${p.estoque > 5 ? 'text-green-600' : 'text-red-500'} font-semibold">${p.estoque}</span></td>
                  <td>
                    <button class="btn-danger" onclick="apagarProduto(${p.id})">Remover</button>
                  </td>
                </tr>
            `).join('');

            // Fetch Pedidos
            const resPedidos = await fetch('http://localhost:3000/api/pedidos', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const pedidos = await resPedidos.json();
            const tbodyPedidos = document.getElementById('pedidos-tbody');

            tbodyPedidos.innerHTML = pedidos.map(ped => `
                <tr>
                  <td class="font-bold text-gray-700">#${ped.id}</td>
                  <td>${ped.cliente_nome}</td>
                  <td>${new Date(ped.criado_em).toLocaleDateString('pt-BR')}</td>
                  <td>
                    <span class="px-2 py-1 rounded text-xs font-semibold ${ped.status === 'pago' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">${ped.status.toUpperCase()}</span>
                  </td>
                  <td>R$ ${parseFloat(ped.total).toFixed(2).replace('.', ',')}</td>
                  <td>
                    ${ped.status === 'pendente' ? `<button class="btn-outline text-xs px-2 py-1" style="background:transparent; color:#10b981; border-color:#10b981" onclick="confirmarPagamento(${ped.id})">Confirmar Pagamento</button>` : ''}
                  </td>
                </tr>
            `).join('');

        } catch (err) {
            console.error(err);
            alert("Erro ao carregar dados do admin.");
        }
    }

    async function apagarProduto(id) {
        if (!confirm('Deseja realmente apagar este produto?')) return;
        try {
            await fetch(`http://localhost:3000/api/produtos/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            loadAdminData();
        } catch (err) {
            alert('Erro ao apagar.');
        }
    }

    async function confirmarPagamento(id) {
        if (!confirm('Deseja confirmar o pagamento deste pedido?')) return;
        try {
            await fetch(`http://localhost:3000/api/pedidos/${id}/pagamento`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            loadAdminData();
        } catch (err) {
            alert('Erro ao confirmar pagamento.');
        }
    }

    loadAdminData();
  </script>
</body>
</html>
